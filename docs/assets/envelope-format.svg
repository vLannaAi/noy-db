<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" font-family="'SF Mono','Fira Code','Cascadia Code',monospace">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="880" height="380" rx="12" fill="url(#bg4)"/>
  <rect x="1" y="1" width="878" height="378" rx="11" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" fill="#f0f6fc" font-size="18" font-weight="700">Encrypted Record Envelope</text>
  <text x="440" y="58" text-anchor="middle" fill="#8b949e" font-size="11">What every adapter sees. What every backend stores.</text>

  <!-- JSON representation -->
  <rect x="60" y="80" width="380" height="210" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- JSON content -->
  <text x="80" y="108" fill="#484f58" font-size="12">{</text>
  <text x="100" y="132" fill="#bc8cff" font-size="12">"_noydb"</text><text x="182" y="132" fill="#484f58" font-size="12">:</text><text x="198" y="132" fill="#d29922" font-size="12">1</text><text x="210" y="132" fill="#484f58" font-size="12">,</text>
  <text x="100" y="158" fill="#bc8cff" font-size="12">"_v"</text><text x="142" y="158" fill="#484f58" font-size="12">:</text><text x="166" y="158" fill="#d29922" font-size="12">3</text><text x="178" y="158" fill="#484f58" font-size="12">,</text>
  <text x="100" y="184" fill="#bc8cff" font-size="12">"_ts"</text><text x="148" y="184" fill="#484f58" font-size="12">:</text><text x="168" y="184" fill="#3fb950" font-size="11">"2026-04-04T10:00Z"</text><text x="358" y="184" fill="#484f58" font-size="12">,</text>
  <text x="100" y="210" fill="#bc8cff" font-size="12">"_iv"</text><text x="148" y="210" fill="#484f58" font-size="12">:</text><text x="168" y="210" fill="#3fb950" font-size="11">"a3f2b8c1d4..."</text><text x="310" y="210" fill="#484f58" font-size="12">,</text>
  <text x="100" y="236" fill="#bc8cff" font-size="12">"_data"</text><text x="164" y="236" fill="#484f58" font-size="12">:</text><text x="184" y="236" fill="#f85149" font-size="11">"U2FsdGVkX1+8..."</text>
  <text x="80" y="268" fill="#484f58" font-size="12">}</text>

  <!-- Annotations -->
  <!-- _noydb -->
  <line x1="440" y1="128" x2="500" y2="128" stroke="#30363d" stroke-width="1"/>
  <rect x="508" y="118" width="200" height="22" rx="4" fill="#21262d"/>
  <text x="608" y="133" text-anchor="middle" fill="#8b949e" font-size="9">Format version identifier</text>

  <!-- _v -->
  <line x1="440" y1="154" x2="500" y2="154" stroke="#30363d" stroke-width="1"/>
  <rect x="508" y="144" width="200" height="22" rx="4" fill="#21262d"/>
  <text x="608" y="159" text-anchor="middle" fill="#8b949e" font-size="9">Optimistic concurrency version</text>

  <!-- _ts -->
  <line x1="440" y1="180" x2="500" y2="180" stroke="#30363d" stroke-width="1"/>
  <rect x="508" y="170" width="200" height="22" rx="4" fill="#21262d"/>
  <text x="608" y="185" text-anchor="middle" fill="#8b949e" font-size="9">Last modified (sync engine)</text>

  <!-- _iv -->
  <line x1="440" y1="206" x2="500" y2="206" stroke="#30363d" stroke-width="1"/>
  <rect x="508" y="196" width="200" height="22" rx="4" fill="#21262d"/>
  <text x="608" y="211" text-anchor="middle" fill="#8b949e" font-size="9">12-byte random IV (per write)</text>

  <!-- _data -->
  <line x1="440" y1="232" x2="500" y2="232" stroke="#30363d" stroke-width="1"/>
  <rect x="508" y="222" width="200" height="22" rx="4" fill="#f8514910" stroke="#f85149" stroke-width="1"/>
  <text x="608" y="237" text-anchor="middle" fill="#f85149" font-size="9" font-weight="600">AES-256-GCM ciphertext</text>

  <!-- Legend boxes -->
  <rect x="740" y="120" width="110" height="68" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="795" y="140" text-anchor="middle" fill="#8b949e" font-size="9" font-weight="600">Plaintext</text>
  <line x1="752" y1="148" x2="838" y2="148" stroke="#30363d" stroke-width="1"/>
  <text x="795" y="163" text-anchor="middle" fill="#8b949e" font-size="8">_noydb, _v, _ts</text>
  <text x="795" y="178" text-anchor="middle" fill="#484f58" font-size="8">Sync needs these</text>

  <rect x="740" y="200" width="110" height="56" rx="6" fill="#f8514908" stroke="#f85149" stroke-width="1"/>
  <text x="795" y="220" text-anchor="middle" fill="#f85149" font-size="9" font-weight="600">Encrypted</text>
  <line x1="752" y1="228" x2="838" y2="228" stroke="#30363d" stroke-width="1"/>
  <text x="795" y="243" text-anchor="middle" fill="#484f58" font-size="8">_data (your records)</text>

  <!-- Bottom stats -->
  <rect x="60" y="310" width="180" height="46" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="150" y="330" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="600">AES-256-GCM</text>
  <text x="150" y="346" text-anchor="middle" fill="#484f58" font-size="8">Authenticated encryption</text>

  <rect x="260" y="310" width="180" height="46" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="350" y="330" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="600">Fresh IV per write</text>
  <text x="350" y="346" text-anchor="middle" fill="#484f58" font-size="8">12 bytes, CSPRNG</text>

  <rect x="460" y="310" width="180" height="46" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="550" y="330" text-anchor="middle" fill="#d29922" font-size="10" font-weight="600">Tamper-proof</text>
  <text x="550" y="346" text-anchor="middle" fill="#484f58" font-size="8">GCM auth tag detects changes</text>

  <rect x="660" y="310" width="180" height="46" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="750" y="330" text-anchor="middle" fill="#bc8cff" font-size="10" font-weight="600">Web Crypto API</text>
  <text x="750" y="346" text-anchor="middle" fill="#484f58" font-size="8">Zero npm crypto deps</text>

  <!-- Footer -->
  <text x="440" y="374" text-anchor="middle" fill="#30363d" font-size="9">noydb</text>
</svg>
