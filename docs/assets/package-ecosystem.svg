<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" font-family="'SF Mono','Fira Code','Cascadia Code',monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="660" rx="12" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="658" rx="11" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f0f6fc" font-size="15" font-weight="700">@noy-db package ecosystem</text>
  <text x="600" y="60" text-anchor="middle" fill="#8b949e" font-size="9">hub is the zero-knowledge core — storage adapters (to-*), framework integrations (in-*), auth, and scaffolding orbit around it</text>

  <!-- Section headers -->
  <text x="172" y="96" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="700">@noy-db/to-*</text>
  <text x="172" y="109" text-anchor="middle" fill="#8b949e" font-size="8.5">storage backends</text>

  <text x="966" y="96" text-anchor="middle" fill="#58a6ff" font-size="10" font-weight="700">@noy-db/in-*</text>
  <text x="966" y="109" text-anchor="middle" fill="#8b949e" font-size="8.5">framework integrations</text>

  <text x="600" y="504" text-anchor="middle" fill="#8b949e" font-size="8.5">— auth &amp; scaffolding —</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- CONNECTOR LINES — drawn before nodes so     -->
  <!-- node boxes paint cleanly over them          -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- to-* col A → hub left (solid green, existing) -->
  <g stroke="#3fb950" stroke-width="0.8" opacity="0.28">
    <line x1="166" y1="245" x2="510" y2="330"/>
    <line x1="166" y1="279" x2="510" y2="330"/>
    <line x1="166" y1="313" x2="510" y2="330"/>
    <line x1="166" y1="347" x2="510" y2="330"/>
    <line x1="166" y1="381" x2="510" y2="330"/>
    <line x1="166" y1="415" x2="510" y2="330"/>
  </g>

  <!-- to-* col B → hub left (dashed green, planned) -->
  <g stroke="#3fb950" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.18">
    <line x1="336" y1="177" x2="510" y2="330"/>
    <line x1="336" y1="211" x2="510" y2="330"/>
    <line x1="336" y1="245" x2="510" y2="330"/>
    <line x1="336" y1="279" x2="510" y2="330"/>
    <line x1="336" y1="313" x2="510" y2="330"/>
    <line x1="336" y1="347" x2="510" y2="330"/>
    <line x1="336" y1="381" x2="510" y2="330"/>
    <line x1="336" y1="415" x2="510" y2="330"/>
    <line x1="336" y1="449" x2="510" y2="330"/>
    <line x1="336" y1="483" x2="510" y2="330"/>
  </g>

  <!-- hub right → in-* col A (4 solid + 2 dashed) -->
  <g stroke="#58a6ff" stroke-width="0.8" opacity="0.28">
    <line x1="690" y1="330" x2="855" y2="245"/>
    <line x1="690" y1="330" x2="855" y2="279"/>
    <line x1="690" y1="330" x2="855" y2="313"/>
    <line x1="690" y1="330" x2="855" y2="347"/>
  </g>
  <g stroke="#58a6ff" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.18">
    <line x1="690" y1="330" x2="855" y2="381"/>
    <line x1="690" y1="330" x2="855" y2="415"/>
    <!-- hub right → in-* col B (all planned) -->
    <line x1="690" y1="330" x2="1025" y2="262"/>
    <line x1="690" y1="330" x2="1025" y2="296"/>
    <line x1="690" y1="330" x2="1025" y2="330"/>
    <line x1="690" y1="330" x2="1025" y2="364"/>
    <line x1="690" y1="330" x2="1025" y2="398"/>
  </g>

  <!-- hub bottom → auth (amber) + create (purple) -->
  <line x1="600" y1="357" x2="422" y2="520" stroke="#d29922" stroke-width="0.8" opacity="0.28"/>
  <line x1="600" y1="357" x2="600" y2="520" stroke="#d29922" stroke-width="0.8" opacity="0.28"/>
  <line x1="600" y1="357" x2="778" y2="520" stroke="#bc8cff" stroke-width="0.8" opacity="0.28"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- HUB — center node                      -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="510" y="303" width="180" height="54" rx="8" fill="#0d1117" stroke="url(#hubGrad)" stroke-width="2.5" filter="url(#glow)"/>
  <text x="600" y="321" text-anchor="middle" fill="#8b949e" font-size="9">@noy-db /</text>
  <text x="600" y="344" text-anchor="middle" fill="#f0f6fc" font-size="18" font-weight="bold">hub</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- to-* col A — existing (solid green)    -->
  <!-- x=8, w=158, rows start y=232, step=34  -->
  <!-- ═══════════════════════════════════════ -->
  <g fill="#0d1117" stroke="#3fb950" stroke-width="1.5">
    <rect x="8" y="232" width="158" height="26" rx="4"/>
    <rect x="8" y="266" width="158" height="26" rx="4"/>
    <rect x="8" y="300" width="158" height="26" rx="4"/>
    <rect x="8" y="334" width="158" height="26" rx="4"/>
    <rect x="8" y="368" width="158" height="26" rx="4"/>
    <rect x="8" y="402" width="158" height="26" rx="4"/>
  </g>
  <g text-anchor="middle" fill="#3fb950" font-size="9.5">
    <text x="87" y="249">to-memory</text>
    <text x="87" y="283">to-file</text>
    <text x="87" y="317">to-browser-local</text>
    <text x="87" y="351">to-browser-idb</text>
    <text x="87" y="385">to-aws-dynamo</text>
    <text x="87" y="419">to-aws-s3</text>
  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- to-* col B — planned (dashed green, dimmed) -->
  <!-- x=178, w=158, rows start y=164, step=34    -->
  <!-- ═══════════════════════════════════════════ -->
  <g fill="#0d1117" stroke="#3fb950" stroke-width="1" stroke-dasharray="4,2.5" opacity="0.55">
    <rect x="178" y="164" width="158" height="26" rx="4"/>
    <rect x="178" y="198" width="158" height="26" rx="4"/>
    <rect x="178" y="232" width="158" height="26" rx="4"/>
    <rect x="178" y="266" width="158" height="26" rx="4"/>
    <rect x="178" y="300" width="158" height="26" rx="4"/>
    <rect x="178" y="334" width="158" height="26" rx="4"/>
    <rect x="178" y="368" width="158" height="26" rx="4"/>
    <rect x="178" y="402" width="158" height="26" rx="4"/>
    <rect x="178" y="436" width="158" height="26" rx="4"/>
    <rect x="178" y="470" width="158" height="26" rx="4"/>
  </g>
  <g text-anchor="middle" fill="#3fb950" font-size="9.5" opacity="0.45">
    <text x="257" y="181">to-cloudflare-r2</text>
    <text x="257" y="215">to-cloudflare-d1</text>
    <text x="257" y="249">to-supabase</text>
    <text x="257" y="283">to-ipfs</text>
    <text x="257" y="317">to-git</text>
    <text x="257" y="351">to-webdav</text>
    <text x="257" y="385">to-sqlite</text>
    <text x="257" y="419">to-turso</text>
    <text x="257" y="453">to-firestore</text>
    <text x="257" y="487">to-postgres</text>
  </g>

  <!-- ═════════════════════════════════════════════════ -->
  <!-- in-* col A — 4 existing (solid) + 2 planned (dash) -->
  <!-- x=855, w=158, rows start y=232, step=34          -->
  <!-- ═════════════════════════════════════════════════ -->
  <g fill="#0d1117" stroke="#58a6ff" stroke-width="1.5">
    <rect x="855" y="232" width="158" height="26" rx="4"/>
    <rect x="855" y="266" width="158" height="26" rx="4"/>
    <rect x="855" y="300" width="158" height="26" rx="4"/>
    <rect x="855" y="334" width="158" height="26" rx="4"/>
  </g>
  <g text-anchor="middle" fill="#58a6ff" font-size="9.5">
    <text x="934" y="249">in-vue</text>
    <text x="934" y="283">in-nuxt</text>
    <text x="934" y="317">in-pinia</text>
    <text x="934" y="351">in-yjs</text>
  </g>
  <g fill="#0d1117" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,2.5" opacity="0.55">
    <rect x="855" y="368" width="158" height="26" rx="4"/>
    <rect x="855" y="402" width="158" height="26" rx="4"/>
  </g>
  <g text-anchor="middle" fill="#58a6ff" font-size="9.5" opacity="0.45">
    <text x="934" y="385">in-react</text>
    <text x="934" y="419">in-svelte</text>
  </g>

  <!-- ══════════════════════════════════════════════ -->
  <!-- in-* col B — all planned                      -->
  <!-- x=1025, w=158, 5 nodes centered on y=330      -->
  <!-- rows: 249, 283, 317, 351, 385                 -->
  <!-- ══════════════════════════════════════════════ -->
  <g fill="#0d1117" stroke="#58a6ff" stroke-width="1" stroke-dasharray="4,2.5" opacity="0.55">
    <rect x="1025" y="249" width="158" height="26" rx="4"/>
    <rect x="1025" y="283" width="158" height="26" rx="4"/>
    <rect x="1025" y="317" width="158" height="26" rx="4"/>
    <rect x="1025" y="351" width="158" height="26" rx="4"/>
    <rect x="1025" y="385" width="158" height="26" rx="4"/>
  </g>
  <g text-anchor="middle" fill="#58a6ff" font-size="9.5" opacity="0.45">
    <text x="1104" y="266">in-solid</text>
    <text x="1104" y="300">in-qwik</text>
    <text x="1104" y="334">in-tanstack-query</text>
    <text x="1104" y="368">in-tanstack-table</text>
    <text x="1104" y="402">in-zustand</text>
  </g>

  <!-- ══════════════════════════════════════════════ -->
  <!-- Auth (amber) + Scaffolding (purple) — bottom  -->
  <!-- 3 nodes centered on x=600, y=520             -->
  <!-- x: 343, 521, 699  (gap=20, w=158)            -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="343" y="520" width="158" height="26" rx="4" fill="#0d1117" stroke="#d29922" stroke-width="1.5"/>
  <text x="422" y="537" text-anchor="middle" fill="#d29922" font-size="9.5">auth-webauthn</text>

  <rect x="521" y="520" width="158" height="26" rx="4" fill="#0d1117" stroke="#d29922" stroke-width="1.5"/>
  <text x="600" y="537" text-anchor="middle" fill="#d29922" font-size="9.5">auth-oidc</text>

  <rect x="699" y="520" width="158" height="26" rx="4" fill="#0d1117" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="778" y="537" text-anchor="middle" fill="#bc8cff" font-size="9.5">create-noy-db</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- Legend (bottom-left)                          -->
  <!-- ══════════════════════════════════════════════ -->
  <g transform="translate(28, 606)">
    <rect x="0" y="0" width="16" height="11" rx="2" fill="#0d1117" stroke="#8b949e" stroke-width="1.5"/>
    <text x="22" y="9.5" fill="#8b949e" font-size="8.5">shipped</text>

    <rect x="82" y="0" width="16" height="11" rx="2" fill="#0d1117" stroke="#8b949e" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>
    <text x="104" y="9.5" fill="#8b949e" font-size="8.5" opacity="0.7">planned</text>
  </g>
</svg>
