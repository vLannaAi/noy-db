<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720"
     role="img" aria-labelledby="title desc"
     font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="title">noy-db architecture overview</title>
  <desc id="desc">
    The hub package sits at the center holding the always-on core and
    opt-in subsystems. The userland app surrounds it together with the
    five prefixed package families — to-*, in-*, on-*, as-*, by-*.
  </desc>

  <defs>
    <style>
      .label-app    { fill: #1A1A1A; font-size: 16px; font-weight: 600; }
      .label-family { fill: #1A1A1A; font-size: 15px; font-weight: 600; }
      .label-sub    { fill: #4B5563; font-size: 11px; }
      .label-hub    { fill: #1A1A1A; font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
      .label-core   { fill: #1A1A1A; font-size: 13px; font-weight: 600; }
      .label-meta   { fill: #6B7280; font-size: 10.5px; }
      .label-title  { fill: #1A1A1A; font-size: 18px; font-weight: 700; }
      .label-caption{ fill: #6B7280; font-size: 11.5px; font-style: italic; }

      .edge        { stroke: #9CA3AF; stroke-width: 1.5; fill: none; }
      .edge-app    { stroke: #1A1A1A; stroke-width: 2; fill: none; }

      .box-family  { fill: #FFFFFF; stroke: #D1D5DB; stroke-width: 1.5; }
      .box-app     { fill: #1A1A1A; }
      .hub-outer   { fill: #FFCC00; stroke: #1A1A1A; stroke-width: 2.5; }
      .hub-core    { fill: #FFFFFF; stroke: #1A1A1A; stroke-width: 1.5; }
      .hub-sub     { fill: #FFF7CC; stroke: #1A1A1A; stroke-width: 1; stroke-dasharray: 3 3; }
    </style>
  </defs>

  <!-- Title + caption -->
  <text x="480" y="42" text-anchor="middle" class="label-title">noy-db — package architecture</text>
  <text x="480" y="62" text-anchor="middle" class="label-caption">
    one core, five satellite families · the hub is the trust boundary
  </text>

  <!-- ─── Edges first so boxes overlay them cleanly ──────────────── -->

  <!-- App (top) → Hub -->
  <line class="edge-app" x1="480" y1="158" x2="480" y2="270"/>

  <!-- Hub → satellites (lines start from rim of hub ellipse) -->
  <!-- in-* (upper-right, 2 o'clock) -->
  <line class="edge" x1="600" y1="320" x2="745" y2="240"/>
  <!-- as-* (lower-right, 4 o'clock) -->
  <line class="edge" x1="600" y1="400" x2="745" y2="480"/>
  <!-- to-* (bottom, 6 o'clock) -->
  <line class="edge" x1="480" y1="450" x2="480" y2="570"/>
  <!-- by-* (lower-left, 8 o'clock) -->
  <line class="edge" x1="360" y1="400" x2="215" y2="480"/>
  <!-- on-* (upper-left, 10 o'clock) -->
  <line class="edge" x1="360" y1="320" x2="215" y2="240"/>

  <!-- ─── Hub (center) ───────────────────────────────────────────── -->

  <!-- Outer hub shape — large rounded box -->
  <ellipse cx="480" cy="360" rx="160" ry="100" class="hub-outer"/>

  <!-- @noy-db/hub label at top of the hub -->
  <text x="480" y="298" text-anchor="middle" class="label-hub">@noy-db/hub</text>

  <!-- Core inner pill -->
  <rect x="356" y="318" width="248" height="36" rx="18" class="hub-core"/>
  <text x="480" y="341" text-anchor="middle" class="label-core">always-on core</text>

  <!-- Subsystems pill -->
  <rect x="356" y="362" width="248" height="36" rx="18" class="hub-sub"/>
  <text x="480" y="385" text-anchor="middle" class="label-core">17 opt-in subsystems</text>

  <!-- Hub footnote -->
  <text x="480" y="423" text-anchor="middle" class="label-meta">
    encryption boundary · stores see only ciphertext
  </text>

  <!-- ─── App (top) ──────────────────────────────────────────────── -->

  <rect x="380" y="100" width="200" height="58" rx="8" class="box-app"/>
  <text x="480" y="128" text-anchor="middle" class="label-app" fill="#FFFFFF">your app</text>
  <text x="480" y="148" text-anchor="middle" class="label-meta" fill="#FFCC00">userland — keeps the keys</text>

  <!-- ─── Satellites ─────────────────────────────────────────────── -->

  <!-- in-* (upper-right) -->
  <rect x="640" y="200" width="210" height="62" rx="8" class="box-family"/>
  <text x="745" y="226" text-anchor="middle" class="label-family">@noy-db/in-*</text>
  <text x="745" y="247" text-anchor="middle" class="label-sub">framework integrations</text>

  <!-- as-* (lower-right) -->
  <rect x="640" y="450" width="210" height="62" rx="8" class="box-family"/>
  <text x="745" y="476" text-anchor="middle" class="label-family">@noy-db/as-*</text>
  <text x="745" y="497" text-anchor="middle" class="label-sub">portable export formats</text>

  <!-- to-* (bottom) -->
  <rect x="380" y="570" width="200" height="62" rx="8" class="box-family"/>
  <text x="480" y="596" text-anchor="middle" class="label-family">@noy-db/to-*</text>
  <text x="480" y="617" text-anchor="middle" class="label-sub">storage destinations</text>

  <!-- by-* (lower-left) -->
  <rect x="110" y="450" width="210" height="62" rx="8" class="box-family"/>
  <text x="215" y="476" text-anchor="middle" class="label-family">@noy-db/by-*</text>
  <text x="215" y="497" text-anchor="middle" class="label-sub">session-share transports</text>

  <!-- on-* (upper-left) -->
  <rect x="110" y="200" width="210" height="62" rx="8" class="box-family"/>
  <text x="215" y="226" text-anchor="middle" class="label-family">@noy-db/on-*</text>
  <text x="215" y="247" text-anchor="middle" class="label-sub">unlock / auth methods</text>

  <!-- ─── Footer legend ──────────────────────────────────────────── -->

  <text x="480" y="685" text-anchor="middle" class="label-caption">
    each prefix reads as a preposition: data goes <tspan font-style="normal" font-weight="700">to</tspan> a backend ·
    runs <tspan font-style="normal" font-weight="700">in</tspan> a framework ·
    you log <tspan font-style="normal" font-weight="700">on</tspan> a method ·
    export <tspan font-style="normal" font-weight="700">as</tspan> a format ·
    sync <tspan font-style="normal" font-weight="700">by</tspan> a transport
  </text>
</svg>
