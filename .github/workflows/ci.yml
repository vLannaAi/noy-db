name: CI

# Standard CI — runs on every PR and push to main.
# Four jobs: privacy guard → lint/typecheck → build → test (matrix).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Privacy guard ────────────────────────────────────────────────────
  # Blocks any commit that contains forbidden strings (client names,
  # internal identifiers). Must pass before anything else runs.
  privacy:
    name: Privacy guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan
        run: bash scripts/check-privacy.sh

  # ── Architecture invariants ──────────────────────────────────────────
  # Enforces the design contract: peer-dep convention, zero crypto deps,
  # hub stays portable (no Node-only imports), and stores never see
  # plaintext. Cheap (~40ms) — runs on every PR before the heavier jobs.
  architecture:
    name: Architecture invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check
        run: node scripts/check-architecture.mjs

  # ── Lint + typecheck ─────────────────────────────────────────────────
  quality:
    name: Lint + typecheck
    needs: [privacy, architecture]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm turbo lint
      - name: Typecheck
        run: pnpm turbo typecheck

  # ── Build (once — caches for test matrix) ────────────────────────────
  build:
    name: Build
    needs: [privacy, architecture]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm turbo build

  # ── Test matrix (runtime-supported Node versions) ────────────────────
  test:
    name: Test (node ${{ matrix.node }})
    needs: [quality, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm turbo build
      # Concurrency=1 avoids cross-package temp-dir / port collisions
      # that surfaced with the default parallel runner. Each package's
      # test suite is fast on its own; serializing them adds < 1 minute
      # to the matrix wall time.
      - name: Test
        run: pnpm turbo test --concurrency=1
