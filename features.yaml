  - id: query-basics
    name: Always-on query DSL
    cluster: core
    spec: SUBSYSTEMS.md#the-minimalist-core
    subsystem_doc: docs/core/06-query-basics.md
    package: '@noy-db/hub'
    factory: null
    status: stable
    showcases: []
    recipes: []
    playground_pages: []
    diagrams: []
