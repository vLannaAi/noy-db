#
# Each recipe is a doc page in docs/recipes/ + (usually) a runnable test
# under showcases/src/recipe-*.recipe.test.ts. The doc explains the
# pattern; the test verifies it stays green as the codebase evolves.

recipes:
  - id: personal-notebook
    name: Personal encrypted notebook
    doc: docs/recipes/personal-notebook.md
    showcase_path: showcases/src/recipe-personal-notebook.recipe.test.ts
    status: stable
    exercises:
      features: [vault-and-collections, encryption, query-basics]
      adapters: [to-memory, to-browser-idb, to-file]

  - id: accounting-app
    name: Accounting application
    doc: docs/recipes/accounting-app.md
    showcase_path: showcases/src/recipe-accounting-app.recipe.test.ts
    status: stable
    exercises:
      features: [history, periods, blobs, i18n, consent, aggregate, team]
      adapters: [to-postgres, to-aws-dynamo]

  - id: realtime-crdt-app
    name: Real-time collaborative app
    doc: docs/recipes/realtime-crdt-app.md
    showcase_path: showcases/src/recipe-realtime-crdt.recipe.test.ts
    status: stable
    exercises:
      features: [crdt, sync, live, team, session]
      frameworks: [in-yjs]

  - id: analytics-app
    name: Analytics-heavy querying
    doc: docs/recipes/analytics-app.md
    showcase_path: showcases/src/recipe-analytics.recipe.test.ts
    status: stable
    exercises:
      features: [indexing, aggregate, joins, routing, session]
      frameworks: [in-tanstack-query, in-tanstack-table]

  - id: email-archive
    name: Email archive (one entity, many facets)
    doc: docs/recipes/email-archive.md
    status: preview
    exercises:
      features: [blobs, schema-and-refs, query-basics]
