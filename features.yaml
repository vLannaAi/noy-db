    package: '@noy-db/hub'
    factory: null
    status: stable
    showcases:
      - id: 00-hello-vault
        path: showcases/src/00-hello-vault.showcase.test.ts
    recipes: []
    playground_pages: []
    diagrams: []
    invariants:
      - 'every record envelope has _noydb, _v, _ts, _iv, _data'
      - 'stores see only ciphertext (architecture invariant: stores-ciphertext-only)'
    related: [encryption, permissions, stores-contract]

  - id: encryption
    name: Encryption layer
    cluster: core
