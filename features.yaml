# noy-db feature registry — single source of truth for the spec ↔ artefact graph.
#
# Validated by `scripts/validate-features.mjs` (CI's "Spec coverage" job).
# Schema in `scripts/feature-schema.json`.
#
# This file is the keystone of the post-reset showcases + playground plan
# (see /Users/vicio/Desktop/deep-research-report.md). Every feature change
# must touch this file; CI fails on dangling references.
#
# Structure: { schemaVersion, features, adapters, frameworks, auths,
#              exports, topologies, recipes }
#
# Phase 1 ships only the 6 always-on core features. Subsystems, adapters,
# framework integrations, auth methods, export formats, topologies, and
# recipes populate in phases 2-8.

schemaVersion: 1

# ─── Always-on core (phase 1) ─────────────────────────────────────────

