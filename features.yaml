    diagrams: []
    invariants:
      - 'casAtomic: true (DynamoDB ConditionExpression on attribute_not_exists / _v match)'
      - 'Schema: pk = vaultName, sk = "{collection}#{id}"'
      - 'Pairs naturally with @noy-db/to-aws-s3 via routeStore for blob offload'
    related: [stores-contract, to-aws-s3]

  - id: to-aws-s3
